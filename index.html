<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Sites Profissionais</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reset e Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background com a imagem (Simulada com degradê e overlay) */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); /* Imagem de exemplo similar */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5%;
        }

        /* Título Principal */
        .header-content {
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .header-content h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1.1;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .rocket-icon {
            color: #ff4d4d;
            margin-right: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        /* Texto Descritivo */
        .description {
            max-width: 500px;
            margin-left: auto; /* Alinhado à direita como no design */
            text-align: right;
            line-height: 1.6;
            font-size: 1.1rem;
            color: #e0e0e0;
        }

        /* Container de Botões/Links Sociais */
        .social-links {
            margin-top: 3rem;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            align-items: center;
        }

        /* Estilo e Animação dos Botões */
        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 1.8rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
        }

        .whatsapp-btn {
            background: #25d366;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1rem !important;
            font-weight: bold;
            gap: 8px;
        }

        /* Efeitos de Hover */
        .social-links a:hover {
            transform: scale(1.2) translateY(-5px);
            color: #ccc;
        }

        .whatsapp-btn:hover {
            background: #1da851;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            color: white !important;
        }

        /* Animação do Foguete */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .description, .social-links {
                text-align: left;
                justify-content: flex-start;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="header-content">
            <h1>
                <span class="rocket-icon">🚀</span><br>
                Criação<br>de Sites<br>Profissionais
            </h1>
        </div>

        <div class="description">
            <p>
                Eu crio sites modernos, rápidos e profissionais para empresas, lojas e projetos pessoais. 
                Meu objetivo é ajudar você a ter uma presença forte na internet com um site bonito, 
                funcional e adaptado para celular e computador.
            </p>
        </div>

        <div class="social-links">
            <a href="https://wa.me/5511932251920?text=Ol%C3%A1%2C%20gostaria%20de%20saber%20mais%20sobre%20seus%20servi%C3%A7os." target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </section>

</body>
</html>
